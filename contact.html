<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Simple Adder - SumUp - Simple Adder Web App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
  <div class="nav-container">
    <a href="index.html" class="logo">Sum<span>Up</span></a>
    <nav class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link active">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero">
    <h1>Get in Touch</h1>
    <p>Have suggestions, questions, or just want to say hello? Drop us a message below.</p>
  </section>

  <div class="card">
    <form onsubmit="event.preventDefault(); alert('Thank you for reaching out! This is a demo form, but we appreciate your feedback.'); this.reset();">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="Jane Doe" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="jane@example.com" required>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" class="form-input" rows="5" placeholder="What's on your mind?" style="resize: vertical; font-family: inherit;" required></textarea>
      </div>

      <button type="submit" class="btn">Send Message</button>
    </form>
  </div>
</main>

<footer class="site-footer">
  <p>&copy; 2023 SumUp. Built for clean and modern calculation utility.</p>
  <div class="footer-links">
    <a href="index.html">Calculator</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact Us</a>
  </div>
</footer>
</body>
</html>
